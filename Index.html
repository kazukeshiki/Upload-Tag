<!DOCTYPE html>
<html>
<head>
<link rel="prefetch" href="game.html">
<link rel="prefetch" href="win.html">
<link rel="prefetch" href="qr.html">
<meta http-equiv="Cache-Control" content="public, max-age=31536000">
<meta charset="UTF-8">
<title>AI Metadata Intelligence</title>

<style>

body{
margin:0;
font-family:Arial;
background:
radial-gradient(circle at center, rgba(56,189,248,0.35), transparent 50%),
linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
color:white;
text-align:center;
}

.header{
display:flex;
justify-content:center;
gap:40px;
padding-top:70px;
margin-bottom:30px;
}

.edmsLogo{height:75px;}
.mfilesLogo{height:45px;}

.panel{
background:rgba(15,23,42,0.65);
backdrop-filter:blur(12px);
border:1px solid rgba(56,189,248,0.25);
border-radius:18px;
padding:45px;
width:780px;
margin:auto;
box-shadow:0 0 35px rgba(56,189,248,0.2);
}

.title{
font-size:42px;
color:#38bdf8;
}

.subtitle{
font-size:20px;
margin-top:10px;
}

.pipeline{
font-size:40px;
margin-top:20px;
animation:flow 3s infinite;
}

@keyframes flow{

0%{opacity:0.5}
50%{opacity:1}
100%{opacity:0.5}

}

.systemBox{

margin-top:25px;
background:#020617;
border:1px solid #334155;
border-radius:10px;
padding:18px;
font-family:monospace;
text-align:left;

}

.status{

color:#38bdf8;
margin-top:5px;

}

.console{

color:#22c55e;
font-size:14px;
height:140px;
overflow:hidden;

}

.start{

margin-top:30px;
padding:15px 34px;
font-size:18px;
background:#38bdf8;
border:none;
border-radius:10px;
cursor:pointer;
animation:pulse 2s infinite;

}

@keyframes pulse{

0%{transform:scale(1)}
50%{transform:scale(1.06)}
100%{transform:scale(1)}

}

</style>
</head>

<body>

<div class="header">

<img src="edms.png" class="edmsLogo">
<img src="mfiles.png" class="mfilesLogo">

</div>


<div class="panel">

<div class="title">
Find Documents Instantly with AI Metadata
</div>

<div class="subtitle">
Think you can tag documents faster than AI?
</div>

<div class="pipeline">
📄 → 🏷 → 📂
</div>

<div class="systemBox">

<b>AI SYSTEM STATUS</b>
<hr>

<div id="status" class="status">
Initializing classification engine...
</div>

</div>

<div class="systemBox console">

<b>AI ENGINE LOG</b>
<hr>

<div id="activityLog"></div>

</div>

<button class="start" onclick="startGame()">
🎮 Try the Upload & Tag Race
</button>

</div>


<script>

const statusMessages=[

"Initializing classification engine...",
"Scanning document structure...",
"Detecting metadata fields...",
"Pattern recognition active...",
"Classification engine ready"

];

let s=0;

setInterval(()=>{

document.getElementById("status").innerText=statusMessages[s];

s++;

if(s>=statusMessages.length)s=0;

},2000);



const activities=[

"metadata_scan started",
"classification_engine active",
"contract_agreement.pdf → Legal",
"vendor_invoice.xlsx → Finance",
"employment_contract.pdf → HR",
"audit_report.pdf → Finance",
"document_pattern matched",
"metadata_prediction completed"

];

function getTime(){

const now=new Date();

let h=String(now.getHours()).padStart(2,"0");
let m=String(now.getMinutes()).padStart(2,"0");
let s=String(now.getSeconds()).padStart(2,"0");

return `[${h}:${m}:${s}]`;

}

function addLog(){

const log=document.createElement("div");

log.innerText=getTime()+"  "+activities[Math.floor(Math.random()*activities.length)];

const box=document.getElementById("activityLog");

box.prepend(log);

if(box.children.length>7){

box.removeChild(box.lastChild);

}

}

setInterval(addLog,3000);


function startGame(){

window.location.href="game.html";

}

</script>

</body>
</html>
