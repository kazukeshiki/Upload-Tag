<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>You Beat The AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#1e293b,#0f172a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
animation:flash 0.8s ease;
}

@keyframes flash{
0%{background:#1e293b;}
50%{background:#065f46;}
100%{background:#1e293b;}
}

.box{
background:#1e293b;
padding:60px;
border-radius:16px;
box-shadow:0 0 40px rgba(34,197,94,0.6);
animation:pop 0.6s ease;
z-index:10;
}

@keyframes pop{
0%{transform:scale(0.6);opacity:0;}
60%{transform:scale(1.15);}
100%{transform:scale(1);opacity:1;}
}

.winText{
font-size:64px;
color:#22c55e;
text-shadow:0 0 20px rgba(34,197,94,0.8);
margin-bottom:10px;
}

.subtitle{
font-size:26px;
margin-bottom:20px;
}

button{
margin-top:20px;
background:#38bdf8;
border:none;
padding:14px 30px;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.count{
margin-top:15px;
font-size:16px;
color:#94a3b8;
}

.confetti{
position:absolute;
width:8px;
height:8px;
top:-10px;
opacity:0.9;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<div class="box">

<div class="winText">
🎉 YOU BEAT THE AI!
</div>

<div class="subtitle">

🎁 Preparing your reward...
</div>


<div id="countdown" class="count"></div>

</div>

<audio id="clapSound" src="clap.mp3"></audio>

<script>

/* PLAY SOUND + CONFETTI */

window.onload = function(){

const clap = document.getElementById("clapSound");

clap.play();

createConfetti();

/* stay 7 seconds then go QR */

setTimeout(function(){

window.location.href="qr.html";

},7000);

};

/* CONFETTI EFFECT */

function createConfetti(){

const colors=["#22c55e","#38bdf8","#f59e0b","#ef4444","#a78bfa"];

for(let i=0;i<120;i++){

const conf=document.createElement("div");

conf.className="confetti";

conf.style.left=Math.random()*100+"vw";

conf.style.background=colors[Math.floor(Math.random()*colors.length)];

conf.style.animationDuration=(Math.random()*3+2)+"s";

conf.style.transform="rotate("+Math.random()*360+"deg)";

document.body.appendChild(conf);

}

}

</script>
</body>
</html>
