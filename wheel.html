<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prize Wheel</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#1e293b,#0f172a);
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

h1{
margin-bottom:25px;
}

/* POINTER */

.pointer{

width:0;
height:0;

border-left:12px solid transparent;
border-right:12px solid transparent;
border-top:20px solid #f8fafc;

position:absolute;
top:-18px;
left:50%;

transform:translateX(-50%);
z-index:10;

transition:transform .08s;

/* metallic shine */
filter:
drop-shadow(0 0 4px rgba(255,255,255,0.9))
drop-shadow(0 2px 4px rgba(0,0,0,0.6));

}

.pointer.knock{
transform:translateX(-50%) rotate(14deg) scale(1.05);
}

/* WHEEL */

#wheelContainer{
position:relative;
}

#wheel{
width:460px;
height:460px;
border-radius:50%;
border:14px solid #334155;
position:relative;

box-shadow:
0 0 40px rgba(0,0,0,0.6),
inset 0 0 40px rgba(0,0,0,0.4),
0 0 20px rgba(56,189,248,0.5);

}

/* ICON */

.segment{
position:absolute;
top:50%;
left:50%;
font-size:36px;
transform-origin:center;
pointer-events:none;
transition:transform .3s;
}

/* WIN ICON */

.segment.win{
transform:scale(1.4);
filter:
drop-shadow(0 0 10px white)
drop-shadow(0 0 25px #22c55e)
drop-shadow(0 0 45px #22c55e);
}

/* WIN GLOW */

.winGlow{
position:absolute;
width:100%;
height:100%;
border-radius:50%;
pointer-events:none;
animation:glowPulse 1.2s ease-in-out infinite;
}

@keyframes glowPulse{

0%{ box-shadow:0 0 0 rgba(34,197,94,0); }
50%{ box-shadow:0 0 80px rgba(34,197,94,0.9); }
100%{ box-shadow:0 0 0 rgba(34,197,94,0); }

}

/* BUTTON */

.spinBtn{

margin-top:30px;
padding:14px 36px;
font-size:18px;

background:#38bdf8;
border:none;
border-radius:12px;

cursor:pointer;

box-shadow:0 0 15px rgba(56,189,248,.5);

}

/* RESULT */

.result{

margin-top:25px;
font-size:30px;
font-weight:bold;

opacity:0;
transform:scale(.6);

}

.result.show{

animation:winText .8s ease forwards;

}

@keyframes winText{

0%{opacity:0;transform:scale(.5);}
60%{opacity:1;transform:scale(1.2);}
100%{opacity:1;transform:scale(1);}

}

/* NEXT */

.nextBtn{

margin-top:20px;
padding:14px 26px;
font-size:16px;

background:#22c55e;
border:none;
border-radius:10px;

cursor:pointer;
display:none;

}

</style>
</head>

<body>

<h1>🎡 Spin The Prize Wheel</h1>

<div id="wheelContainer">

<div class="pointer" id="pointer"></div>
<div id="wheel"></div>

</div>

<button class="spinBtn" onclick="spinWheel()">SPIN</button>

<div id="result" class="result"></div>

<button class="nextBtn" onclick="nextPlayer()">Next Player</button>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* AUDIO */

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTick(){

const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.frequency.value=900;
gain.gain.value=0.12;

osc.start();
osc.stop(audioCtx.currentTime+.02);

}

function playDing(){

const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.frequency.value=1400;
gain.gain.value=0.25;

osc.start();

osc.frequency.exponentialRampToValueAtTime(600,audioCtx.currentTime+.25);

osc.stop(audioCtx.currentTime+.3);

}

/* PRIZES */

const basePrizes=[

{icon:"📓",name:"Notebook"},
{icon:"🥤",name:"Shaker Bottle"},
{icon:"🍬",name:"Candy"}

];

let prizes=[];

basePrizes.forEach(p=>{
for(let i=0;i<3;i++)prizes.push({...p});
});

const wheel=document.getElementById("wheel");
const pointer=document.getElementById("pointer");

let iconElements=[];

const segments=prizes.length;
const segmentAngle=360/segments;

const colors=["#38bdf8","#22c55e","#f59e0b"];

/* BUILD WHEEL BACKGROUND */

function buildWheel(){

let gradient="conic-gradient(";

for(let i=0;i<segments;i++){

let start=i*segmentAngle;
let end=(i+1)*segmentAngle;

gradient+=`${colors[i%3]} ${start}deg ${end}deg`;

if(i<segments-1)gradient+=",";

}

gradient+=")";

wheel.style.background=gradient;

}

/* DIVIDERS */

function buildDividers(){

for(let i=0;i<segments;i++){

let d=document.createElement("div");

d.style.position="absolute";
d.style.width="2px";
d.style.height="230px";
d.style.background="rgba(255,255,255,0.35)";
d.style.left="50%";
d.style.top="0";
d.style.transformOrigin="bottom";
d.style.transform=`rotate(${i*segmentAngle}deg)`;

wheel.appendChild(d);

}

}

/* SHUFFLE PRIZES */

function shufflePrizes(){

for(let i=prizes.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[prizes[i],prizes[j]]=[prizes[j],prizes[i]];

}

}

/* BUILD ICONS */

function buildIcons(){

iconElements.forEach(e=>e.remove());
iconElements=[];

prizes.forEach((p,i)=>{

let icon=document.createElement("div");

icon.className="segment";
icon.innerText=p.icon;

let angle=i*segmentAngle+segmentAngle/2;
let radius=170;

icon.style.transform=
`rotate(${angle}deg) translateY(-${radius}px) rotate(-${angle}deg)`;

icon.style.marginLeft="-18px";
icon.style.marginTop="-18px";

wheel.appendChild(icon);

iconElements.push(icon);

});

}

/* INITIALIZE */

buildWheel();
buildDividers();
buildIcons();

/* SPIN ENGINE */

let spinning=false;
let rotation=0;
let velocity=0;
let lastSegment=-1;

function spinWheel(){

if(spinning)return;

shufflePrizes();
buildIcons();

spinning=true;
velocity=25;

iconElements.forEach(i=>i.classList.remove("win"));

document.getElementById("result").classList.remove("show");
document.getElementById("result").innerText="";
document.querySelector(".nextBtn").style.display="none";

animateSpin();

}

/* PHYSICS */

function animateSpin(){

rotation+=velocity;

velocity*=0.985;

wheel.style.transform=`rotate(${rotation}deg)`;

let deg=rotation%360;

let segment=Math.floor((360-deg)/segmentAngle)%segments;

if(segment!==lastSegment){

playTick();

pointer.classList.add("knock");

setTimeout(()=>pointer.classList.remove("knock"),80);

lastSegment=segment;

}

if(velocity>0.3){

requestAnimationFrame(animateSpin);

}else{

finishSpin();

}

}

/* FINISH */

function finishSpin(){

spinning=false;

let deg=rotation%360;

let index=Math.floor((360-deg)/segmentAngle)%segments;

let prize=prizes[index];

iconElements[index].classList.add("win");

/* glow */

const glow=document.createElement("div");
glow.className="winGlow";

wheel.appendChild(glow);

/* result */

const result=document.getElementById("result");

result.innerText="🏆 You won: "+prize.icon+" "+prize.name;

result.classList.add("show");

/* sound */

playDing();

/* confetti */

confetti({

particleCount:260,
spread:120,
origin:{y:0.6}

});

document.querySelector(".nextBtn").style.display="inline-block";

}

function nextPlayer(){

window.location.href = "index.html";

}

</script>

</body>

</html>
